<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal | Hope Harbor</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;500;600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Cormorant Garamond"', 'serif'],
                        sans: ['"Inter"', 'sans-serif'],
                        display: ['"DM Sans"', 'sans-serif'],
                    },
                    colors: {
                        sage: { 50: '#f4f7f4', 100: '#e3ebe3', 200: '#c5d9c5', 300: '#9bbd9b', 500: '#6b9b6b', 700: '#4a6b4a', 900: '#2d422d' },
                        clay: { 50: '#faf6f3', 100: '#f0e6dd', 500: '#c98f6d', 700: '#a66d4d' },
                        lavender: { 50: '#f8f8fc', 100: '#f0f0f9', 500: '#8a8ac4' },
                        earth: '#1a1a1a', cream: '#faf9f7',
                    }
                }
            }
        }
    </script>
    
    <style>
        .nav-blur { backdrop-filter: blur(20px); background: rgba(250, 249, 247, 0.8); }
        
        .mood-btn {
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .mood-btn:hover { transform: translateY(-4px); }
        .mood-btn.selected { 
            transform: scale(1.1); 
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.2);
        }
        
        .entry-card {
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .entry-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -20px rgba(0,0,0,0.15);
        }
        
        /* Mood Chart Bars */
        .mood-bar {
            transition: height 1s cubic-bezier(0.22, 1, 0.36, 1);
        }
    </style>
</head>
<body class="bg-cream text-earth font-sans antialiased">

    <nav class="fixed w-full z-50 nav-blur border-b border-sage-100/50">
        <div class="max-w-7xl mx-auto px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="index.html" class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-full bg-sage-500 flex items-center justify-center">
                        <i data-lucide="flower-2" class="w-5 h-5 text-white"></i>
                    </div>
                    <span class="font-serif text-2xl text-earth font-medium">Hope Harbor</span>
                </a>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="text-sm font-display font-medium text-earth/60">Sanctuary</a>
                    <a href="wellness.html" class="text-sm font-display font-medium text-earth/60">Practices</a>
                    <a href="journal.html" class="text-sm font-display font-medium text-earth">Journal</a>
                    <a href="resources.html" class="text-sm font-display font-medium text-earth/60">Guidance</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="pt-32 pb-20 max-w-7xl mx-auto px-6 lg:px-8">
        <div class="mb-12">
            <h1 class="font-serif text-5xl text-earth mb-4">Your Sanctuary</h1>
            <p class="text-earth/60 text-lg">A private space for reflection. All data remains on your device.</p>
        </div>

        <div class="grid lg:grid-cols-12 gap-8">
            <!-- Left Column: Entry Form -->
            <div class="lg:col-span-5">
                <div class="bg-white rounded-3xl p-8 shadow-sm border border-sage-100 sticky top-24">
                    <h2 class="font-serif text-2xl text-earth mb-6">New Entry</h2>
                    
                    <form id="journal-form" onsubmit="saveEntry(event)" class="space-y-6">
                        <!-- Mood Selection -->
                        <div>
                            <label class="block text-sm font-display font-medium text-earth/60 mb-3 uppercase tracking-wider">How are you feeling?</label>
                            <div class="flex justify-between gap-2">
                                <button type="button" onclick="selectMood(1, this)" class="mood-btn flex-1 aspect-square rounded-2xl bg-red-50 hover:bg-red-100 flex items-center justify-center text-3xl" title="Very Low">😢</button>
                                <button type="button" onclick="selectMood(2, this)" class="mood-btn flex-1 aspect-square rounded-2xl bg-orange-50 hover:bg-orange-100 flex items-center justify-center text-3xl" title="Low">😕</button>
                                <button type="button" onclick="selectMood(3, this)" class="mood-btn flex-1 aspect-square rounded-2xl bg-yellow-50 hover:bg-yellow-100 flex items-center justify-center text-3xl" title="Okay">😐</button>
                                <button type="button" onclick="selectMood(4, this)" class="mood-btn flex-1 aspect-square rounded-2xl bg-blue-50 hover:bg-blue-100 flex items-center justify-center text-3xl" title="Good">🙂</button>
                                <button type="button" onclick="selectMood(5, this)" class="mood-btn flex-1 aspect-square rounded-2xl bg-green-50 hover:bg-green-100 flex items-center justify-center text-3xl" title="Great">😄</button>
                            </div>
                            <input type="hidden" id="mood-value" required>
                        </div>

                        <!-- Title -->
                        <div>
                            <label class="block text-sm font-display font-medium text-earth/60 mb-2 uppercase tracking-wider">Title</label>
                            <input type="text" id="entry-title" placeholder="What's on your mind?" 
                                   class="w-full px-4 py-3 rounded-xl bg-cream border-none focus:ring-2 focus:ring-sage-300 outline-none transition font-serif text-lg">
                        </div>

                        <!-- Content -->
                        <div>
                            <label class="block text-sm font-display font-medium text-earth/60 mb-2 uppercase tracking-wider">Reflection</label>
                            <textarea id="entry-content" rows="6" placeholder="Write freely here..." 
                                      class="w-full px-4 py-3 rounded-xl bg-cream border-none focus:ring-2 focus:ring-sage-300 outline-none transition resize-none leading-relaxed"
                                      required></textarea>
                        </div>

                        <!-- Tags -->
                        <div>
                            <label class="block text-sm font-display font-medium text-earth/60 mb-2 uppercase tracking-wider">Tags</label>
                            <div class="flex flex-wrap gap-2" id="tag-container">
                                <button type="button" onclick="toggleTag(this, 'gratitude')" class="px-4 py-2 rounded-full border border-sage-200 text-sm text-earth/70 hover:bg-sage-50 hover:border-sage-300 transition">gratitude</button>
                                <button type="button" onclick="toggleTag(this, 'anxiety')" class="px-4 py-2 rounded-full border border-sage-200 text-sm text-earth/70 hover:bg-sage-50 hover:border-sage-300 transition">anxiety</button>
                                <button type="button" onclick="toggleTag(this, 'hope')" class="px-4 py-2 rounded-full border border-sage-200 text-sm text-earth/70 hover:bg-sage-50 hover:border-sage-300 transition">hope</button>
                                <button type="button" onclick="toggleTag(this, 'sleep')" class="px-4 py-2 rounded-full border border-sage-200 text-sm text-earth/70 hover:bg-sage-50 hover:border-sage-300 transition">sleep</button>
                            </div>
                            <input type="hidden" id="entry-tags">
                        </div>

                        <button type="submit" class="w-full py-4 bg-earth text-cream rounded-xl font-display font-medium hover:bg-sage-700 transition-all flex items-center justify-center gap-2 group">
                            <span>Save Entry</span>
                            <i data-lucide="arrow-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                        </button>
                    </form>

                    <div class="mt-6 pt-6 border-t border-sage-100">
                        <button onclick="exportData()" class="w-full py-3 border border-sage-200 text-sage-700 rounded-xl text-sm font-medium hover:bg-sage-50 transition flex items-center justify-center gap-2">
                            <i data-lucide="download" class="w-4 h-4"></i>
                            Export Data (JSON)
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Column: Analytics & Entries -->
            <div class="lg:col-span-7 space-y-8">
                
                <!-- Mood Analytics -->
                <div class="bg-white rounded-3xl p-8 shadow-sm border border-sage-100">
                    <h3 class="font-serif text-2xl text-earth mb-6">Mood Patterns</h3>
                    <div class="h-48 flex items-end justify-between gap-2" id="mood-chart">
                        <div class="w-full h-full flex items-center justify-center text-earth/40 text-sm">
                            No entries yet. Start journaling to see patterns.
                        </div>
                    </div>
                    <div class="flex justify-between mt-4 text-xs text-earth/40 font-display uppercase tracking-wider">
                        <span>Last 7 Days</span>
                        <span>Average: <span id="avg-mood">-</span></span>
                    </div>
                </div>

                <!-- Entries List -->
                <div>
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="font-serif text-2xl text-earth">Recent Entries</h3>
                        <button onclick="clearAll()" class="text-sm text-red-400 hover:text-red-600 transition">Clear All</button>
                    </div>
                    
                    <div id="entries-list" class="space-y-4">
                        <!-- Entries injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        let selectedTags = [];
        let entries = JSON.parse(localStorage.getItem('hope_harbor_entries') || '[]');
        
        // Initialize
        renderEntries();
        updateChart();
        
        function selectMood(level, btn) {
            document.getElementById('mood-value').value = level;
            document.querySelectorAll('.mood-btn').forEach(b => {
                b.classList.remove('selected', 'ring-2', 'ring-sage-400');
            });
            btn.classList.add('selected', 'ring-2', 'ring-sage-400');
        }
        
        function toggleTag(btn, tag) {
            if (selectedTags.includes(tag)) {
                selectedTags = selectedTags.filter(t => t !== tag);
                btn.classList.remove('bg-sage-100', 'border-sage-500', 'text-sage-800');
                btn.classList.add('border-sage-200', 'text-earth/70');
            } else {
                selectedTags.push(tag);
                btn.classList.add('bg-sage-100', 'border-sage-500', 'text-sage-800');
                btn.classList.remove('border-sage-200', 'text-earth/70');
            }
            document.getElementById('entry-tags').value = JSON.stringify(selectedTags);
        }
        
        function saveEntry(e) {
            e.preventDefault();
            
            const mood = document.getElementById('mood-value').value;
            if (!mood) {
                alert('Please select your mood');
                return;
            }
            
            const entry = {
                id: Date.now(),
                date: new Date().toISOString(),
                mood: parseInt(mood),
                title: document.getElementById('entry-title').value || 'Untitled',
                content: document.getElementById('entry-content').value,
                tags: selectedTags
            };
            
            entries.unshift(entry);
            localStorage.setItem('hope_harbor_entries', JSON.stringify(entries));
            
            // Reset form
            document.getElementById('journal-form').reset();
            document.getElementById('mood-value').value = '';
            document.querySelectorAll('.mood-btn').forEach(b => {
                b.classList.remove('selected', 'ring-2', 'ring-sage-400');
            });
            document.querySelectorAll('#tag-container button').forEach(b => {
                b.classList.remove('bg-sage-100', 'border-sage-500', 'text-sage-800');
                b.classList.add('border-sage-200', 'text-earth/70');
            });
            selectedTags = [];
            
            renderEntries();
            updateChart();
        }
        
        function renderEntries() {
            const container = document.getElementById('entries-list');
            
            if (entries.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-16 text-earth/40">
                        <i data-lucide="book-open" class="w-12 h-12 mx-auto mb-4 opacity-50"></i>
                        <p class="text-lg">Your journal is waiting for your first entry.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }
            
            container.innerHTML = entries.map(entry => {
                const date = new Date(entry.date);
                const moodEmojis = ['', '😢', '😕', '😐', '🙂', '😄'];
                const moodColors = ['', 'bg-red-50 border-red-200', 'bg-orange-50 border-orange-200', 
                                    'bg-yellow-50 border-yellow-200', 'bg-blue-50 border-blue-200', 
                                    'bg-green-50 border-green-200'];
                
                return `
                    <div class="entry-card bg-white rounded-2xl p-6 shadow-sm border border-sage-100">
                        <div class="flex items-start justify-between mb-4">
                            <div class="flex items-center gap-3">
                                <div class="${moodColors[entry.mood]} border rounded-xl w-12 h-12 flex items-center justify-center text-2xl">
                                    ${moodEmojis[entry.mood]}
                                </div>
                                <div>
                                    <h4 class="font-serif text-xl text-earth">${entry.title}</h4>
                                    <p class="text-xs text-earth/40 font-display mt-1">
                                        ${date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' })}
                                        at ${date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}
                                    </p>
                                </div>
                            </div>
                            <button onclick="deleteEntry(${entry.id})" class="text-earth/30 hover:text-red-500 transition">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                        
                        <p class="text-earth/70 leading-relaxed mb-4">${entry.content}</p>
                        
                        ${entry.tags.length > 0 ? `
                            <div class="flex flex-wrap gap-2">
                                ${entry.tags.map(tag => `
                                    <span class="px-3 py-1 bg-sage-50 text-sage-700 rounded-full text-xs font-medium">
                                        ${tag}
                                    </span>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
            
            lucide.createIcons();
        }
        
        function updateChart() {
            const chartContainer = document.getElementById('mood-chart');
            const last7Days = entries.slice(0, 7).reverse();
            
            if (last7Days.length === 0) {
                chartContainer.innerHTML = `
                    <div class="w-full h-full flex items-center justify-center text-earth/40 text-sm">
                        No entries yet. Start journaling to see patterns.
                    </div>
                `;
                document.getElementById('avg-mood').textContent = '-';
                return;
            }
            
            const maxMood = 5;
            const avgMood = (last7Days.reduce((sum, e) => sum + e.mood, 0) / last7Days.length).toFixed(1);
            const moodEmojis = ['', '😢', '😕', '😐', '🙂', '😄'];
            
            document.getElementById('avg-mood').textContent = `${avgMood} ${moodEmojis[Math.round(avgMood)]}`;
            
            chartContainer.innerHTML = last7Days.map((entry, i) => {
                const height = (entry.mood / maxMood) * 100;
                const colors = ['', 'bg-red-400', 'bg-orange-400', 'bg-yellow-400', 'bg-blue-400', 'bg-green-400'];
                const date = new Date(entry.date);
                
                return `
                    <div class="flex-1 flex flex-col items-center gap-2">
                        <div class="w-full relative flex items-end" style="height: 100%;">
                            <div class="mood-bar w-full ${colors[entry.mood]} rounded-t-lg transition-all" 
                                 style="height: ${height}%;"
                                 title="${entry.title} - ${moodEmojis[entry.mood]}">
                            </div>
                        </div>
                        <span class="text-xs text-earth/40 font-display">
                            ${date.toLocaleDateString('en-US', { weekday: 'short' })}
                        </span>
                    </div>
                `;
            }).join('');
        }
        
        function deleteEntry(id) {
            if (!confirm('Delete this entry? This cannot be undone.')) return;
            
            entries = entries.filter(e => e.id !== id);
            localStorage.setItem('hope_harbor_entries', JSON.stringify(entries));
            renderEntries();
            updateChart();
        }
        
        function clearAll() {
            if (!confirm('Clear all entries? This cannot be undone.')) return;
            
            entries = [];
            localStorage.setItem('hope_harbor_entries', JSON.stringify(entries));
            renderEntries();
            updateChart();
        }
        
        function exportData() {
            if (entries.length === 0) {
                alert('No entries to export');
                return;
            }
            
            const dataStr = JSON.stringify(entries, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `hope-harbor-journal-${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }
    </script>

</body>
</html>
